{% extends "base.html" %}
{% load static %}

{% block title %}Password Updated{% endblock %}

{% block content %}

<div class="flex flex-col items-center justify-center min-h-screen pt-0 pb-12 px-6">
  <div class="w-full max-w-lg lg:max-w-lg text-center">

    <!-- Icon -->
    <div class="flex justify-center mb-8">
      <div class="w-20 h-20 rounded-full bg-app-muted flex items-center justify-center">
        <span class="ms-filled text-4xl text-ink">lock_reset</span>
      </div>
    </div>

    <!-- Message -->
    <h1 class="font-serif text-3xl text-ink leading-tight mb-4">Password Updated</h1>
    <p class="font-serif italic text-sm text-ink-light leading-relaxed mb-8">
      Your password has been changed. You can now sign in with your new password.
    </p>

    <a href="{% url 'accounts:login' %}"
       class="gic-btn font-sans inline-block bg-gradient-to-br from-[#695d4a] to-[#7a6e5a] text-white rounded-full px-10 py-4 text-sm font-light tracking-wide">
      Sign In →
    </a>

  </div>
</div>

{% endblock %}
