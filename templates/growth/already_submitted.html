{% extends "base.html" %}

{% block title %}Already Submitted{% endblock %}

{% block content %}

<div class="pt-5 pb-6">
  <a href="/" class="font-sans text-xs text-ink-light tracking-wide mb-4 inline-block">← Back</a>
</div>

<div class="bg-gradient-to-tr from-[#FFFCF7] to-[#F0EEE5] rounded-[2rem] p-10 md:max-w-xl">
  <div class="w-12 h-12 rounded-2xl bg-ink/10 flex items-center justify-center mb-6">
    <span class="ms-filled text-2xl text-accent">check_circle</span>
  </div>
  <h2 class="font-serif text-xl text-ink leading-snug mb-3">Already submitted</h2>
  <p class="font-serif text-sm text-ink-mid leading-loose">
    You have already submitted your {{ flow }} for this week. Come back next week.
  </p>
  <a href="/"
     class="gic-btn font-sans inline-block mt-8 bg-gradient-to-br from-[#695d4a] to-[#7a6e5a] text-white text-xs px-8 py-3 rounded-full font-light tracking-normal">
    Back to Today
  </a>
</div>

{% endblock %}
