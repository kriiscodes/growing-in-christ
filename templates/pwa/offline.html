{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #FFFCF7;
      color: #383831;
      font-family: 'Noto Serif', Georgia, serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: #F0EEE5;
      border-radius: 2rem;
      padding: 2.5rem;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      display: block;
    }
    .eyebrow {
      font-family: 'Noto Sans', ui-sans-serif, system-ui, sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #695D4A;
      font-weight: 500;
      margin-bottom: 0.75rem;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 400;
      color: #383831;
      line-height: 1.3;
      margin-bottom: 1rem;
    }
    p {
      font-size: 0.875rem;
      color: #6b6355;
      line-height: 1.8;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #695d4a, #7a6e5a);
      color: #fff;
      font-family: 'Noto Sans', ui-sans-serif, system-ui, sans-serif;
      font-size: 0.7rem;
      font-weight: 300;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      text-decoration: none;
      letter-spacing: 0.05em;
    }
    .quote {
      font-style: italic;
      font-size: 0.7rem;
      color: #BABAB0;
      margin-top: 2.5rem;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="{% static 'images/logo.png' %}" alt="Growing in Christ" class="logo">
    <p class="eyebrow">Growing in Christ</p>
    <h1>You're offline</h1>
    <p>
      It looks like you've lost your connection.<br>
      Check your network and try again.
    </p>
    <a href="/" class="btn">Go home</a>
    <p class="quote">"I can do all things through Christ who strengthens me."</p>
  </div>
</body>
</html>
